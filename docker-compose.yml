services:
  backend:
    build:
      context: ./apps/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      BACKEND_CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./apps/backend/app:/app/app:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
